<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D7AFF"/>
      <stop offset="50%" stop-color="#8B2DFF"/>
      <stop offset="100%" stop-color="#FF2D78"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#1A1A2E"/>
  <!-- Vulpen silhouet, licht gedraaid als schrijvend -->
  <g transform="translate(16,16) rotate(-20) translate(-16,-16)">
    <!-- Pennenhouder -->
    <rect x="13" y="4" width="6" height="16" rx="2" fill="url(#ag)"/>
    <!-- Toeloop naar punt -->
    <path d="M13,20 L16,28 L19,20 Z" fill="url(#ag)"/>
    <!-- Clip detail -->
    <rect x="19.5" y="5" width="1.5" height="9" rx="0.75" fill="white" opacity="0.35"/>
    <!-- Punt highlight -->
    <circle cx="16" cy="27" r="1" fill="white" opacity="0.7"/>
  </g>
</svg>
