<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="24" fill="#3D2B1F" opacity="0.15"/>
  <!-- BIC Cristal pen (iconic hexagonal transparent body) -->
  <g transform="rotate(-10, 90, 100)">
    <!-- Transparent body -->
    <rect x="82" y="25" width="14" height="120" rx="2" fill="#E8F4FF" opacity="0.7" stroke="#B0D4F1" stroke-width="0.5"/>
    <!-- Ink tube inside -->
    <rect x="87" y="30" width="4" height="95" rx="1" fill="#0055CC" opacity="0.5"/>
    <!-- Blue cap -->
    <rect x="80" y="15" width="18" height="18" rx="2" fill="#0055CC"/>
    <polygon points="80,33 98,33 89,38" fill="#0055CC"/>
    <!-- Hole in body -->
    <circle cx="89" cy="60" r="2" fill="#FFF" opacity="0.4"/>
    <!-- Tip -->
    <polygon points="84,145 94,145 89,158" fill="#CCC"/>
    <circle cx="89" cy="157" r="1.5" fill="#999"/>
  </g>
  <!-- "100 billion" text -->
  <text x="115" y="75" font-size="28" font-weight="bold" fill="#0055CC" opacity="0.15" font-family="sans-serif">100</text>
  <text x="115" y="95" font-size="10" fill="#0055CC" opacity="0.15" font-family="sans-serif">MILJARD</text>
  <!-- Multiple pens faded (mass production) -->
  <g opacity="0.15">
    <rect x="130" y="110" width="6" height="60" rx="1" fill="#0055CC"/>
    <rect x="140" y="105" width="6" height="65" rx="1" fill="#CC0000"/>
    <rect x="150" y="112" width="6" height="58" rx="1" fill="#008800"/>
    <rect x="160" y="108" width="6" height="62" rx="1" fill="#000"/>
  </g>
  <!-- Price tag -->
  <g transform="translate(125, 140)">
    <rect width="50" height="24" rx="4" fill="#FFD700" opacity="0.3"/>
    <text x="8" y="16" font-size="10" font-weight="bold" fill="#8B6914" font-family="sans-serif">$0.10</text>
  </g>
</svg>
