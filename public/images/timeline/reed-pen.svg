<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Reed pen & clay tablet -->
  <rect width="200" height="200" rx="24" fill="#3D2B1F" opacity="0.15"/>
  <!-- Clay tablet -->
  <rect x="30" y="90" width="80" height="70" rx="6" fill="#C4A35A" opacity="0.8"/>
  <rect x="32" y="92" width="76" height="66" rx="4" fill="#D4B76A"/>
  <!-- Cuneiform marks -->
  <line x1="42" y1="105" x2="55" y2="105" stroke="#8B7340" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="105" x2="48" y2="98" stroke="#8B7340" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="105" x2="73" y2="105" stroke="#8B7340" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="118" x2="55" y2="118" stroke="#8B7340" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="118" x2="73" y2="118" stroke="#8B7340" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="118" x2="66" y2="111" stroke="#8B7340" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="131" x2="55" y2="131" stroke="#8B7340" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="144" x2="73" y2="144" stroke="#8B7340" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Reed pen -->
  <g transform="rotate(-35, 140, 80)">
    <rect x="130" y="40" width="8" height="100" rx="3" fill="#8B6914"/>
    <polygon points="130,140 138,140 134,158" fill="#6B5010"/>
    <line x1="134" y1="140" x2="134" y2="155" stroke="#4A3808" stroke-width="0.8"/>
  </g>
  <!-- Papyrus scroll hint -->
  <ellipse cx="155" cy="160" rx="25" ry="8" fill="#C4A35A" opacity="0.4"/>
  <rect x="140" y="120" width="30" height="40" rx="3" fill="#D4B76A" opacity="0.6"/>
</svg>
