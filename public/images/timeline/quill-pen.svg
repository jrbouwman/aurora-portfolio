<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="24" fill="#3D2B1F" opacity="0.15"/>
  <!-- Inkwell -->
  <ellipse cx="60" cy="155" rx="30" ry="10" fill="#2A2A2A"/>
  <rect x="35" y="130" width="50" height="25" rx="4" fill="#333"/>
  <ellipse cx="60" cy="130" rx="25" ry="9" fill="#444"/>
  <ellipse cx="60" cy="130" rx="18" ry="6" fill="#1A1A3A"/>
  <!-- Ink surface shimmer -->
  <ellipse cx="55" cy="128" rx="6" ry="2" fill="#2A2A5A" opacity="0.6"/>
  <!-- Quill feather -->
  <g transform="rotate(-25, 100, 90)">
    <!-- Shaft -->
    <line x1="80" y1="30" x2="140" y2="170" stroke="#E8DCC8" stroke-width="2.5"/>
    <!-- Feather barbs left -->
    <path d="M80,30 Q50,50 70,80 Q60,60 80,45" fill="#F5EDE0" opacity="0.9"/>
    <path d="M85,45 Q55,65 75,95 Q65,75 85,60" fill="#EDE5D5" opacity="0.8"/>
    <path d="M90,60 Q60,80 80,110 Q70,90 90,75" fill="#E5DCC8" opacity="0.7"/>
    <!-- Feather barbs right -->
    <path d="M80,30 Q110,50 90,80 Q100,60 80,45" fill="#F5EDE0" opacity="0.9"/>
    <path d="M85,45 Q115,65 95,95 Q105,75 85,60" fill="#EDE5D5" opacity="0.8"/>
    <path d="M90,60 Q120,80 100,110 Q110,90 90,75" fill="#E5DCC8" opacity="0.7"/>
    <!-- Nib -->
    <polygon points="138,165 142,165 140,180" fill="#E8DCC8"/>
    <line x1="140" y1="165" x2="140" y2="178" stroke="#C4B8A0" stroke-width="0.5"/>
  </g>
  <!-- Ink drops -->
  <circle cx="120" cy="160" r="3" fill="#1A1A3A" opacity="0.5"/>
  <circle cx="130" cy="155" r="2" fill="#1A1A3A" opacity="0.3"/>
</svg>
