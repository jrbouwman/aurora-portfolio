<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" fill="none">
  <!-- Thick ink stroke trail — smooth curve from left to pen tip -->
  <path d="M10 260 Q 40 250, 70 255 T 130 245 T 190 238 T 230 228 T 255 215"
        stroke="url(#ink-gradient)" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M5 265 Q 45 255, 80 260 T 140 250 T 200 243 T 240 233 T 258 220"
        stroke="url(#ink-gradient)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.25"/>
  <!-- Subtle splatter dots -->
  <circle cx="20" cy="258" r="2" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="100" cy="248" r="1.5" fill="#D946EF" opacity="0.15"/>

  <!-- Pen body — angled writing position, tip meets the stroke -->
  <g transform="translate(260, 210) rotate(32)">
    <!-- Cap top -->
    <rect x="-6" y="-130" width="12" height="8" rx="3" fill="#4338CA" opacity="0.8"/>
    <!-- Pen barrel -->
    <rect x="-5.5" y="-122" width="11" height="80" rx="2.5" fill="url(#pen-body)"/>
    <!-- Barrel ring -->
    <rect x="-6" y="-44" width="12" height="3" rx="1" fill="#F5F0EB" opacity="0.15"/>
    <!-- Grip section -->
    <rect x="-4.5" y="-41" width="9" height="28" rx="2" fill="#7C72A0" opacity="0.6"/>
    <!-- Grip ridges -->
    <line x1="-4" y1="-35" x2="4" y2="-35" stroke="white" stroke-width="0.5" opacity="0.1"/>
    <line x1="-4" y1="-30" x2="4" y2="-30" stroke="white" stroke-width="0.5" opacity="0.1"/>
    <line x1="-4" y1="-25" x2="4" y2="-25" stroke="white" stroke-width="0.5" opacity="0.1"/>
    <line x1="-4" y1="-20" x2="4" y2="-20" stroke="white" stroke-width="0.5" opacity="0.1"/>
    <!-- Nib -->
    <path d="M-3.5,-13 L0,12 L3.5,-13 Z" fill="url(#nib-gradient)"/>
    <!-- Nib slit -->
    <line x1="0" y1="-8" x2="0" y2="10" stroke="#555" stroke-width="0.6" opacity="0.4"/>
    <!-- Ink at tip -->
    <circle cx="0" cy="12" r="2.5" fill="#D946EF" opacity="0.8"/>
    <circle cx="0" cy="12" r="5" fill="#D946EF" opacity="0.15"/>
    <!-- Clip -->
    <rect x="6" y="-125" width="2.5" height="50" rx="1" fill="#F5F0EB" opacity="0.15"/>
    <circle cx="7.25" cy="-76" r="2" fill="#F5F0EB" opacity="0.12"/>
    <!-- Barrel shine -->
    <rect x="-3.5" y="-115" width="2" height="35" rx="1" fill="white" opacity="0.12"/>
  </g>

  <defs>
    <linearGradient id="ink-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.1"/>
      <stop offset="40%" stop-color="#D946EF" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#F47264" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F47264" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="pen-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="40%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="nib-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4D4D8"/>
      <stop offset="100%" stop-color="#71717A"/>
    </linearGradient>
  </defs>
</svg>
